<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link id="favicon" rel="icon" type="image/png" sizes="192x192" href="/prima-web-logo.png?v=4" />
    <link rel="apple-touch-icon" sizes="180x180" href="/prima-web-logo.png?v=4" />
    <script>
      (function () {
        var img = new Image();
        img.onload = function () {
          var size = 192;
          var canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          var ctx = canvas.getContext('2d');
          var r = size * 0.22;
          ctx.beginPath();
          ctx.moveTo(r, 0);
          ctx.lineTo(size - r, 0);
          ctx.quadraticCurveTo(size, 0, size, r);
          ctx.lineTo(size, size - r);
          ctx.quadraticCurveTo(size, size, size - r, size);
          ctx.lineTo(r, size);
          ctx.quadraticCurveTo(0, size, 0, size - r);
          ctx.lineTo(0, r);
          ctx.quadraticCurveTo(0, 0, r, 0);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, size, size);
          var link = document.getElementById('favicon');
          if (link) link.href = canvas.toDataURL('image/png');
        };
        img.src = '/prima-web-logo.png?v=4';
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6C47FF" />
    <meta name="description" content="PrimaPlug — Real-Time Workforce Network" />
    <meta property="og:title" content="PrimaPlug" />
    <meta property="og:description" content="Real-Time Workforce Network" />
    <meta property="og:image" content="/prima-web-logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <title>PrimaPlug</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://checkout.flutterwave.com/v3.js"></script>
  </body>
</html>
